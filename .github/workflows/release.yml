name: Auto Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies for Tauri checks
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> src-tauri/target

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release verification gate
        run: pnpm run release:verify

      - name: Resolve release version
        id: version
        run: |
          set -Eeuo pipefail

          APP_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          TAURI_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).version")"
          CARGO_VERSION="$(sed -n '/^\[package\]/,/^\[/ s/^version = \"\\([^\"]*\\)\"$/\\1/p' src-tauri/Cargo.toml | head -n1)"

          if [[ "$APP_VERSION" != "$TAURI_VERSION" || "$APP_VERSION" != "$CARGO_VERSION" ]]; then
            echo "Version mismatch detected:" >&2
            echo "package.json: $APP_VERSION" >&2
            echo "tauri.conf.json: $TAURI_VERSION" >&2
            echo "Cargo.toml: $CARGO_VERSION" >&2
            exit 1
          fi

          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        run: |
          set -Eeuo pipefail
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists: ${{ steps.version.outputs.tag }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.tag.outputs.exists == 'false'
        run: |
          set -Eeuo pipefail

          VERSION="${{ steps.version.outputs.app_version }}"
          TAG="${{ steps.version.outputs.tag }}"
          OUTPUT_FILE="$RUNNER_TEMP/release-notes.md"

          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          RELEASE_DATE="$(date -u +'%Y-%m-%d')"
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -Fxv "$TAG" | head -n1 || true)"

          if [[ -n "$PREVIOUS_TAG" ]]; then
            CHANGES="$(git log --no-merges --pretty=format:'- %s (%h)' "$PREVIOUS_TAG..HEAD" | sed '/^[[:space:]]*$/d' || true)"
          else
            CHANGES="$(git log --no-merges --pretty=format:'- %s (%h)' | sed '/^[[:space:]]*$/d' || true)"
          fi

          if [[ -z "$CHANGES" ]]; then
            CHANGES='- Maintenance release.'
          fi

          {
            echo "# Convly Studio $TAG"
            echo
            echo "Date: $RELEASE_DATE"
            echo "Commit: \`$FULL_SHA\`"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo "Previous tag: \`$PREVIOUS_TAG\`"
            fi
            echo
            echo "## Summary"
            echo "Automated release for version \`$VERSION\` from commit \`$SHORT_SHA\`."
            echo
            echo "## Changes"
            echo "$CHANGES"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              echo
              echo "## Compare"
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG}"
            fi
          } > "$OUTPUT_FILE"

      - name: Build AppImage bundle
        if: steps.tag.outputs.exists == 'false'
        run: pnpm run tauri:build -- --bundles appimage

      - name: Collect AppImage assets
        if: steps.tag.outputs.exists == 'false'
        id: assets
        run: |
          set -Eeuo pipefail
          shopt -s nullglob

          files=(
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.sig
          )

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No AppImage artifacts were produced." >&2
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -F "$RUNNER_TEMP/release-notes.md"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          name: Convly Studio ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: ${{ steps.assets.outputs.files }}
          fail_on_unmatched_files: true
          generate_release_notes: false

      - name: Skip release
        if: steps.tag.outputs.exists == 'true'
        run: echo "Release skipped because tag already exists for this version."
